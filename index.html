
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon_BCC.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue Crow Capital - Virtual Agent</title>
    <!-- Azure Speech SDK -->
    <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@latest/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* For custom scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b; /* slate-800 */
      }
      ::-webkit-scrollbar-thumb {
        background: #475569; /* slate-600 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* slate-500 */
      }

      /* Markdown content styling */
      .markdown-content {
        line-height: 1.6;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      .markdown-content p {
        margin: 0.75em 0;
        display: block;
      }

      .markdown-content p:first-child {
        margin-top: 0;
      }

      .markdown-content p:last-child {
        margin-bottom: 0;
      }

      .markdown-content ul,
      .markdown-content ol {
        display: block;
        margin: 0.75em 0;
        padding-left: 2em;
        list-style-position: outside;
      }

      .markdown-content ul {
        list-style-type: disc;
      }

      .markdown-content ol {
        list-style-type: decimal;
      }

      .markdown-content li {
        display: list-item;
        margin: 0.5em 0;
        padding-left: 0.25em;
      }

      .markdown-content li > p {
        margin: 0.25em 0;
      }

      .markdown-content strong {
        font-weight: 600;
      }

      .markdown-content em {
        font-style: italic;
      }

      .markdown-content code {
        background: rgba(0, 0, 0, 0.3);
        padding: 0.1em 0.3em;
        border-radius: 3px;
        font-family: 'Courier New', monospace;
        font-size: 0.9em;
      }

      .markdown-content pre {
        background: rgba(0, 0, 0, 0.3);
        padding: 0.75em;
        border-radius: 6px;
        overflow-x: auto;
        margin: 0.5em 0;
      }

      .markdown-content pre code {
        background: none;
        padding: 0;
      }

      .markdown-content h1,
      .markdown-content h2,
      .markdown-content h3,
      .markdown-content h4,
      .markdown-content h5,
      .markdown-content h6 {
        font-weight: 600;
        margin: 0.75em 0 0.5em 0;
      }

      .markdown-content h1 { font-size: 1.5em; }
      .markdown-content h2 { font-size: 1.3em; }
      .markdown-content h3 { font-size: 1.1em; }

      .markdown-content a {
        color: #60a5fa; /* blue-400 */
        text-decoration: underline;
      }

      .markdown-content a:hover {
        color: #93c5fd; /* blue-300 */
      }

      .markdown-content blockquote {
        border-left: 3px solid #475569; /* slate-600 */
        padding-left: 1em;
        margin: 0.5em 0;
        font-style: italic;
      }

      .markdown-content hr {
        border: none;
        border-top: 1px solid #475569; /* slate-600 */
        margin: 1em 0;
      }

      .markdown-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 0.5em 0;
      }

      .markdown-content th,
      .markdown-content td {
        border: 1px solid #475569; /* slate-600 */
        padding: 0.5em;
        text-align: left;
      }

      .markdown-content th {
        background: rgba(0, 0, 0, 0.3);
        font-weight: 600;
      }
    </style>
  </head>
  <body class="bg-slate-900 text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
